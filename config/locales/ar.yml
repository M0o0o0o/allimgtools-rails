  faq:
    meta_title: "الأسئلة الشائعة — Allimgtools"
    meta_description: "الأسئلة الشائعة حول Allimgtools — أدوات الصور المجانية وخطة Pro والخصوصية وغير ذلك."
    title: "الأسئلة الشائعة"
    contact: "هل لا تزال لديك أسئلة؟"
    contact_link: "تواصل معنا"
    general:
      heading: "عام"
      q1: "هل Allimgtools مجاني؟"
      a1: "نعم. جميع أدوات الصور الـ 6 مجانية تماماً دون الحاجة إلى حساب. يمكن للمستخدمين المجانيين معالجة ما يصل إلى 10 ملفات في المرة الواحدة، بحد أقصى 10 ميجابايت لكل ملف."
      q2: "هل أحتاج إلى إنشاء حساب؟"
      a2: "لا. يمكنك استخدام جميع الأدوات دون التسجيل. الحساب ضروري فقط إذا أردت الترقية إلى Pro."
      q3: "ما صيغ الملفات المدعومة؟"
      a3: "ندعم JPEG و PNG و GIF و WebP و AVIF."
    pro_plan:
      heading: "خطة Pro"
      q1: "ماذا تتضمن خطة Pro؟"
      a1: "يمكن لمستخدمي Pro رفع ما يصل إلى 30 ملفاً لكل دُفعة (مقابل 10 في الخطة المجانية) ومعالجة ملفات يصل حجمها إلى 30 ميجابايت لكل منها (مقابل 10 ميجابايت في الخطة المجانية). كل شيء آخر متطابق."
      q2: "كيف يمكنني الدفع؟"
      a2: "تُعالَج المدفوعات بأمان عبر Paddle. نقبل جميع بطاقات الائتمان والخصم الرئيسية."
      q3: "هل يمكنني الإلغاء في أي وقت؟"
      a3_html: "نعم. يمكنك الإلغاء في أي وقت من <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">صفحتي</a>. دون أي أسئلة."
      q4: "ماذا يحدث عند الإلغاء؟"
      a4: "يستمر وصولك إلى Pro حتى نهاية فترة الفوترة الحالية. لن تُحاسَب بعد ذلك."
      q5: "هل يمكنني الحصول على استرداد؟"
      a5_html: "يرجى التواصل معنا على <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a> وسنبذل قصارى جهدنا لمساعدتك."
      q6: "اشتركت ولكن ميزات Pro غير متاحة."
      a6_html: "انتقل إلى <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">صفحتي</a> وانقر على &ldquo;هل دفعت بالفعل؟ تحقق من الاشتراك&rdquo;. سيؤدي هذا إلى مزامنة حالة اشتراكك يدوياً. إذا استمرت المشكلة، تواصل مع <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a>."
    privacy:
      heading: "الخصوصية والملفات"
      q1: "هل يتم تخزين الملفات التي أرفعها؟"
      a1: "لا. تُعالَج الملفات فوراً وتُحذف تلقائياً في غضون 3 ساعات. لا نقوم أبداً بتخزين صورك أو تحليلها أو مشاركتها."
      q2: "كم من الوقت تكون الملفات المعالجة متاحة للتنزيل؟"
      a2: "روابط التنزيل متاحة لمدة 3 ساعات بعد المعالجة."
    account:
      heading: "الحساب"
      q1: "كيف أسجّل الدخول؟"
      a1: "نستخدم تسجيل الدخول عبر Google. انقر على &ldquo;تسجيل الدخول&rdquo; وسجّل دخولك بحساب Google الخاص بك — لا يلزم أي كلمة مرور."
      q2: "ماذا يحدث إذا حذفت حسابي؟"
      a2: "سيُزال حسابك وجميع البيانات المرتبطة به بصفة دائمة من Allimgtools. إذا كان لديك اشتراك Pro نشط، يرجى إلغاؤه أولاً من صفحتي."

