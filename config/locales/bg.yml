  faq:
    meta_title: "FAQ — Allimgtools"
    meta_description: "Често задавани въпроси за Allimgtools — безплатни инструменти за изображения, план Pro, поверителност и още."
    title: "Често задавани въпроси"
    contact: "Имате още въпроси?"
    contact_link: "Свържете се с нас"
    general:
      heading: "Общи"
      q1: "Безплатен ли е Allimgtools?"
      a1: "Да. Всичките 6 инструмента за изображения са напълно безплатни без нужда от акаунт. Безплатните потребители могат да обработват до 10 файла наведнъж, с максимум 10MB на файл."
      q2: "Трябва ли да създам акаунт?"
      a2: "Не. Можете да използвате всички инструменти без регистрация. Акаунт е необходим само ако искате да надградите до Pro."
      q3: "Какви файлови формати се поддържат?"
      a3: "Поддържаме JPEG, PNG, GIF, WebP и AVIF."
    pro_plan:
      heading: "Pro план"
      q1: "Какво включва Pro планът?"
      a1: "Потребителите на Pro могат да качват до 30 файла на партида (срещу 10 в безплатния) и да обработват файлове до 30MB всеки (срещу 10MB). Всичко останало е същото."
      q2: "Как да платя?"
      a2: "Плащанията се обработват сигурно от Paddle. Приемаме всички основни кредитни и дебитни карти."
      q3: "Мога ли да отменя по всяко време?"
      a3_html: "Да. Можете да отмените по всяко време от вашата <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">Моя страница</a>. Без задавани въпроси."
      q4: "Какво се случва, когато отменям?"
      a4: "Вашият Pro достъп продължава до края на текущия платежен период. Няма да ви бъде начислявано след това."
      q5: "Мога ли да получа възстановяване на сумата?"
      a5_html: "Моля, свържете се с нас на <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a> и ще направим всичко възможно да помогнем."
      q6: "Абонирах се, но Pro функциите не са налични."
      a6_html: "Отидете на <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">Моя страница</a> и кликнете &ldquo;Вече сте платили? Проверете абонамента&rdquo;. Това синхронизира ръчно статуса на вашия абонамент. Ако проблемът продължава, свържете се с <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a>."
    privacy:
      heading: "Поверителност и файлове"
      q1: "Съхраняват ли се качените от мен файлове?"
      a1: "Не. Файловете се обработват незабавно и автоматично се изтриват в рамките на 3 часа. Никога не съхраняваме, анализираме или споделяме вашите изображения."
      q2: "Колко дълго са достъпни обработените файлове за изтегляне?"
      a2: "Линковете за изтегляне са достъпни 3 часа след обработката."
    account:
      heading: "Акаунт"
      q1: "Как да влезна?"
      a1: "Използваме Google Sign-In. Кликнете &ldquo;Влезте&rdquo; и влезте с вашия Google акаунт — без нужда от парола."
      q2: "Какво се случва, ако изтрия акаунта си?"
      a2: "Вашият акаунт и всички свързани данни ще бъдат трайно премахнати от Allimgtools. Ако имате активен Pro абонамент, моля отменете го първо от Моя страница."

