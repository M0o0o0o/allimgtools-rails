  faq:
    meta_title: "FAQ — Allimgtools"
    meta_description: "Preguntes freqüents sobre Allimgtools — eines d'imatge gratuïtes, pla Pro, privacitat i més."
    title: "Preguntes Freqüents"
    contact: "Encara tens preguntes?"
    contact_link: "Contacta'ns"
    general:
      heading: "General"
      q1: "És gratuït Allimgtools?"
      a1: "Sí. Les 6 eines d'imatge són completament gratuïtes sense necessitat de compte. Els usuaris gratuïts poden processar fins a 10 fitxers alhora, amb un màxim de 10MB per fitxer."
      q2: "He de crear un compte?"
      a2: "No. Pots utilitzar totes les eines sense registrar-te. Només cal un compte si vols actualitzar a Pro."
      q3: "Quins formats de fitxer s'admeten?"
      a3: "Admetem JPEG, PNG, GIF, WebP i AVIF."
    pro_plan:
      heading: "Pla Pro"
      q1: "Què inclou el pla Pro?"
      a1: "Els usuaris Pro poden pujar fins a 30 fitxers per lot (vs. 10 en el gratuït) i processar fitxers de fins a 30MB cadascun (vs. 10MB). La resta és igual."
      q2: "Com puc pagar?"
      a2: "Els pagaments es processen de forma segura per Paddle. Acceptem totes les targetes de crèdit i dèbit principals."
      q3: "Puc cancel·lar quan vulgui?"
      a3_html: "Sí. Pots cancel·lar quan vulguis des de la teva <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">La meva pàgina</a>. Sense preguntes."
      q4: "Què passa quan cancel·lo?"
      a4: "El teu accés Pro continua fins al final del teu període de facturació actual. No se't tornarà a cobrar després d'això."
      q5: "Puc obtenir un reemborsament?"
      a5_html: "Si us plau, contacta'ns a <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a> i farem tot el possible per ajudar-te."
      q6: "M'he subscrit però les funcions Pro no estan disponibles."
      a6_html: "Ves a <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">La meva pàgina</a> i fes clic a &ldquo;Ja has pagat? Verifica la subscripció&rdquo;. Això sincronitza manualment l'estat de la teva subscripció. Si el problema persisteix, contacta <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a>."
    privacy:
      heading: "Privacitat i fitxers"
      q1: "Es guarden els fitxers que pujo?"
      a1: "No. Els fitxers es processen immediatament i s'eliminen automàticament en 3 hores. Mai emmagatzemem, analitzem ni compartim les teves imatges."
      q2: "Quant de temps estan disponibles els fitxers processats per descarregar?"
      a2: "Els enllaços de descàrrega estan disponibles durant 3 hores després del processament."
    account:
      heading: "Compte"
      q1: "Com inicio sessió?"
      a1: "Fem servir Google Sign-In. Fes clic a &ldquo;Inicia sessió&rdquo; i accedeix amb el teu compte de Google — no cal contrasenya."
      q2: "Què passa si elimino el meu compte?"
      a2: "El teu compte i totes les dades associades s'eliminen permanentment d'Allimgtools. Si tens una subscripció Pro activa, cancel·la-la primer des de La meva pàgina."

