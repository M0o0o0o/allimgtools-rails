  faq:
    meta_title: "FAQ — Allimgtools"
    meta_description: "Häufig gestellte Fragen zu Allimgtools — kostenlose Bildtools, Pro-Paket, Datenschutz und mehr."
    title: "Häufig gestellte Fragen"
    contact: "Noch Fragen?"
    contact_link: "Kontaktieren Sie uns"
    general:
      heading: "Allgemein"
      q1: "Ist Allimgtools kostenlos?"
      a1: "Ja. Alle 6 Bildtools sind vollständig kostenlos und ohne Konto nutzbar. Kostenlose Nutzer können bis zu 10 Dateien gleichzeitig verarbeiten, mit maximal 10 MB pro Datei."
      q2: "Muss ich ein Konto erstellen?"
      a2: "Nein. Sie können alle Tools ohne Registrierung nutzen. Ein Konto ist nur erforderlich, wenn Sie auf Pro upgraden möchten."
      q3: "Welche Dateiformate werden unterstützt?"
      a3: "Wir unterstützen JPEG, PNG, GIF, WebP und AVIF."
    pro_plan:
      heading: "Pro-Paket"
      q1: "Was ist im Pro-Paket enthalten?"
      a1: "Pro-Nutzer können bis zu 30 Dateien pro Stapel hochladen (statt 10 im kostenlosen Paket) und Dateien bis zu 30 MB verarbeiten (statt 10 MB im kostenlosen Paket). Alles andere ist gleich."
      q2: "Wie kann ich bezahlen?"
      a2: "Zahlungen werden sicher über Paddle abgewickelt. Wir akzeptieren alle gängigen Kredit- und Debitkarten."
      q3: "Kann ich jederzeit kündigen?"
      a3_html: "Ja. Sie können jederzeit über Ihre <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">Mein Bereich</a> kündigen. Keine Fragen gestellt."
      q4: "Was passiert, wenn ich kündige?"
      a4: "Ihr Pro-Zugang läuft bis zum Ende des aktuellen Abrechnungszeitraums weiter. Danach werden keine weiteren Kosten berechnet."
      q5: "Kann ich eine Rückerstattung erhalten?"
      a5_html: "Bitte kontaktieren Sie uns unter <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a> und wir helfen Ihnen so gut wir können."
      q6: "Ich habe ein Abonnement abgeschlossen, aber Pro-Funktionen sind nicht verfügbar."
      a6_html: "Gehen Sie zu <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">Mein Bereich</a> und klicken Sie auf &ldquo;Bereits bezahlt? Abonnement überprüfen&rdquo;. Dies synchronisiert Ihren Abonnementstatus manuell. Wenn das Problem weiterhin besteht, kontaktieren Sie <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a>."
    privacy:
      heading: "Datenschutz & Dateien"
      q1: "Werden meine hochgeladenen Dateien gespeichert?"
      a1: "Nein. Dateien werden sofort verarbeitet und innerhalb von 3 Stunden automatisch gelöscht. Wir speichern, analysieren oder teilen Ihre Bilder niemals."
      q2: "Wie lange sind verarbeitete Dateien zum Download verfügbar?"
      a2: "Download-Links sind 3 Stunden nach der Verarbeitung verfügbar."
    account:
      heading: "Konto"
      q1: "Wie melde ich mich an?"
      a1: "Wir verwenden Google-Anmeldung. Klicken Sie auf &ldquo;Anmelden&rdquo; und melden Sie sich mit Ihrem Google-Konto an — kein Passwort erforderlich."
      q2: "Was passiert, wenn ich mein Konto lösche?"
      a2: "Ihr Konto und alle zugehörigen Daten werden dauerhaft von Allimgtools entfernt. Wenn Sie ein aktives Pro-Abonnement haben, kündigen Sie es bitte zuerst über Mein Bereich."

