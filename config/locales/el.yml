  faq:
    meta_title: "FAQ — Allimgtools"
    meta_description: "Συχνές ερωτήσεις για το Allimgtools — δωρεάν εργαλεία εικόνας, πλάνο Pro, απόρρητο και άλλα."
    title: "Συχνές Ερωτήσεις"
    contact: "Έχετε ακόμα ερωτήσεις;"
    contact_link: "Επικοινωνήστε μαζί μας"
    general:
      heading: "Γενικά"
      q1: "Είναι δωρεάν το Allimgtools;"
      a1: "Ναι. Και τα 6 εργαλεία εικόνας είναι εντελώς δωρεάν χωρίς να χρειάζεται λογαριασμός. Οι δωρεάν χρήστες μπορούν να επεξεργαστούν έως 10 αρχεία τη φορά, με μέγιστο 10MB ανά αρχείο."
      q2: "Χρειάζεται να δημιουργήσω λογαριασμό;"
      a2: "Όχι. Μπορείτε να χρησιμοποιήσετε όλα τα εργαλεία χωρίς εγγραφή. Λογαριασμός χρειάζεται μόνο αν θέλετε να αναβαθμιστείτε στο Pro."
      q3: "Ποιες μορφές αρχείων υποστηρίζονται;"
      a3: "Υποστηρίζουμε JPEG, PNG, GIF, WebP και AVIF."
    pro_plan:
      heading: "Πλάνο Pro"
      q1: "Τι περιλαμβάνει το πλάνο Pro;"
      a1: "Οι χρήστες Pro μπορούν να ανεβάζουν έως 30 αρχεία ανά παρτίδα (έναντι 10 στο Δωρεάν) και να επεξεργάζονται αρχεία έως 30MB το καθένα (έναντι 10MB). Όλα τα άλλα είναι ίδια."
      q2: "Πώς μπορώ να πληρώσω;"
      a2: "Οι πληρωμές επεξεργάζονται με ασφάλεια από την Paddle. Αποδεχόμαστε όλες τις κύριες πιστωτικές και χρεωστικές κάρτες."
      q3: "Μπορώ να ακυρώσω οποιαδήποτε στιγμή;"
      a3_html: "Ναι. Μπορείτε να ακυρώσετε οποιαδήποτε στιγμή από τη <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">Σελίδα μου</a>. Χωρίς ερωτήσεις."
      q4: "Τι συμβαίνει όταν ακυρώσω;"
      a4: "Η πρόσβασή σας στο Pro συνεχίζεται μέχρι το τέλος της τρέχουσας περιόδου χρέωσης. Δεν θα χρεωθείτε ξανά μετά από αυτό."
      q5: "Μπορώ να πάρω επιστροφή χρημάτων;"
      a5_html: "Επικοινωνήστε μαζί μας στο <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a> και θα κάνουμε ό,τι μπορούμε για να βοηθήσουμε."
      q6: "Έκανα εγγραφή αλλά οι λειτουργίες Pro δεν είναι διαθέσιμες."
      a6_html: "Μεταβείτε στη <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">Σελίδα μου</a> και κάντε κλικ στο &ldquo;Έχετε ήδη πληρώσει; Επαλήθευση συνδρομής&rdquo;. Αυτό συγχρονίζει χειροκίνητα την κατάσταση της συνδρομής σας. Αν το πρόβλημα παραμένει, επικοινωνήστε με <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a>."
    privacy:
      heading: "Απόρρητο & Αρχεία"
      q1: "Αποθηκεύονται τα αρχεία που ανεβάζω;"
      a1: "Όχι. Τα αρχεία επεξεργάζονται αμέσως και διαγράφονται αυτόματα εντός 3 ωρών. Δεν αποθηκεύουμε, αναλύουμε ή μοιραζόμαστε ποτέ τις εικόνες σας."
      q2: "Πόσο καιρό είναι διαθέσιμα τα επεξεργασμένα αρχεία για λήψη;"
      a2: "Οι σύνδεσμοι λήψης είναι διαθέσιμοι για 3 ώρες μετά την επεξεργασία."
    account:
      heading: "Λογαριασμός"
      q1: "Πώς συνδέομαι;"
      a1: "Χρησιμοποιούμε Google Sign-In. Κάντε κλικ στο &ldquo;Σύνδεση&rdquo; και συνδεθείτε με τον λογαριασμό Google σας — δεν απαιτείται κωδικός πρόσβασης."
      q2: "Τι συμβαίνει αν διαγράψω τον λογαριασμό μου;"
      a2: "Ο λογαριασμός σας και όλα τα συσχετισμένα δεδομένα αφαιρούνται μόνιμα από το Allimgtools. Αν έχετε ενεργή συνδρομή Pro, ακυρώστε την πρώτα από τη Σελίδα μου."

