      - q: "Can I resize multiple images at once?"
        a: "Yes, you can upload and resize a batch of images in one go."
      - q: "Will resizing maintain the original aspect ratio?"
        a: "By default, aspect ratio is maintained. Uncheck the option to set custom width and height independently."

