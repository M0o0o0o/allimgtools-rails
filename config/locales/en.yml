    faq:
      - q: "What EXIF fields can I edit?"
        a: "You can edit GPS coordinates, date and time, camera info, copyright, keywords, and more."
      - q: "What image formats support EXIF editing?"
        a: "JPEG images have full EXIF support. PNG and WebP have limited metadata support."
      - q: "Can I edit multiple images at once?"
        a: "Yes. Upload multiple images and edit them individually, or use \"Apply to all\" to copy edits across all images."
      - q: "Does editing EXIF data change the image?"
        a: "No. Only the metadata is modified — the image pixels and quality remain unchanged."

  exif:
    page_title: "Free EXIF Remover — Strip Image Metadata Online | Allimgtools"
    page_description: "Remove EXIF metadata from JPEG, PNG, WebP, and GIF images online for free. Strip GPS location, camera info, and other metadata. No signup required."
    sidebar_title: "EXIF Removal"
    info: "Removes all metadata from your images — including GPS location, camera model, date taken, and other EXIF/IPTC data."
    quality_note: "Image quality and dimensions are preserved."
    start: "Remove EXIF"
    title: "EXIF Remover"
    description: "Strip GPS, camera info, and all metadata from your images."
    faq:
      - q: "What is EXIF data?"
        a: "EXIF data is hidden metadata embedded in image files — including GPS location, camera model, and date taken."
      - q: "Why should I remove EXIF data?"
        a: "To protect your privacy. EXIF data can reveal your exact location when a photo was taken."
      - q: "Does removing EXIF data affect image quality?"
        a: "No. Image pixels, dimensions, and visual quality are completely preserved."

