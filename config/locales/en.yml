        a: "You can select any area freely or choose a fixed aspect ratio like 1:1, 4:3, or 16:9."
      - q: "What image formats are supported?"
        a: "JPEG, PNG, WebP, GIF, and AVIF images are supported."
      - q: "Does cropping reduce image quality?"
        a: "No. The cropped area is saved at the original image quality."

