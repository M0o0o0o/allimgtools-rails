  compress:
    page_title: "Free Image Compressor — Reduce File Size Online | Allimgtools"
    page_description: "Compress JPEG, PNG, WebP, GIF, and AVIF images online for free. Adjust quality settings and reduce file size without losing detail. No signup required."
