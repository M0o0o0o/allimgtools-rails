    strip_exif: "Remove EXIF metadata"
    strip_exif_description: "Removes hidden data embedded in the image — such as shooting date, camera model, and GPS location. Useful when sharing images publicly for privacy."
    faq:
      - q: "What image formats can I compress?"
        a: "JPEG, PNG, WebP, GIF, and AVIF formats are all supported."
      - q: "Will compression reduce image quality?"
        a: "At quality 70–85% the visual difference is minimal while file size drops significantly."
      - q: "Does compressing change image dimensions?"
        a: "No. Only the file size is reduced — the width and height stay the same."

