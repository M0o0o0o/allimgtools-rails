        a: "You can convert between JPEG, PNG, and WebP formats."
      - q: "Will converting change image quality?"
        a: "Converting to a lossy format like JPEG or WebP may slightly reduce quality. PNG is lossless."
      - q: "Can I batch convert multiple images?"
        a: "Yes, upload multiple images and they will all be converted at once."

