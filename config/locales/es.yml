  faq:
    meta_title: "FAQ — Allimgtools"
    meta_description: "Preguntas frecuentes sobre Allimgtools — herramientas de imagen gratuitas, plan Pro, privacidad y más."
    title: "Preguntas frecuentes"
    contact: "¿Todavía tienes preguntas?"
    contact_link: "Contáctanos"
    general:
      heading: "General"
      q1: "¿Es Allimgtools gratuito?"
      a1: "Sí. Las 6 herramientas de imagen son completamente gratuitas y no requieren cuenta. Los usuarios gratuitos pueden procesar hasta 10 archivos a la vez, con un máximo de 10 MB por archivo."
      q2: "¿Necesito crear una cuenta?"
      a2: "No. Puedes usar todas las herramientas sin registrarte. Solo se necesita una cuenta si quieres actualizar a Pro."
      q3: "¿Qué formatos de archivo son compatibles?"
      a3: "Admitimos JPEG, PNG, GIF, WebP y AVIF."
    pro_plan:
      heading: "Plan Pro"
      q1: "¿Qué incluye el plan Pro?"
      a1: "Los usuarios Pro pueden subir hasta 30 archivos por lote (frente a 10 en el plan gratuito) y procesar archivos de hasta 30 MB cada uno (frente a 10 MB en el plan gratuito). Todo lo demás es igual."
      q2: "¿Cómo puedo pagar?"
      a2: "Los pagos se procesan de forma segura a través de Paddle. Aceptamos todas las principales tarjetas de crédito y débito."
      q3: "¿Puedo cancelar en cualquier momento?"
      a3_html: "Sí. Puedes cancelar en cualquier momento desde tu <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">Mi página</a>. Sin preguntas."
      q4: "¿Qué pasa cuando cancelo?"
      a4: "Tu acceso Pro continúa hasta el final de tu período de facturación actual. No se te cobrará nada más después de eso."
      q5: "¿Puedo obtener un reembolso?"
      a5_html: "Por favor, contáctanos en <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a> y haremos todo lo posible para ayudarte."
      q6: "Me suscribí pero las funciones Pro no están disponibles."
      a6_html: "Ve a <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">Mi página</a> y haz clic en &ldquo;¿Ya pagaste? Verificar suscripción&rdquo;. Esto sincroniza manualmente el estado de tu suscripción. Si el problema persiste, contacta a <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a>."
    privacy:
      heading: "Privacidad y archivos"
      q1: "¿Se almacenan mis archivos subidos?"
      a1: "No. Los archivos se procesan de inmediato y se eliminan automáticamente en 3 horas. Nunca almacenamos, analizamos ni compartimos tus imágenes."
      q2: "¿Cuánto tiempo están disponibles los archivos procesados para descargar?"
      a2: "Los enlaces de descarga están disponibles durante 3 horas tras el procesamiento."
    account:
      heading: "Cuenta"
      q1: "¿Cómo inicio sesión?"
      a1: "Usamos el inicio de sesión de Google. Haz clic en &ldquo;Iniciar sesión&rdquo; e ingresa con tu cuenta de Google — no se requiere contraseña."
      q2: "¿Qué pasa si elimino mi cuenta?"
      a2: "Tu cuenta y todos los datos asociados se eliminan permanentemente de Allimgtools. Si tienes una suscripción Pro activa, cancélala primero desde Mi página."

