  faq:
    meta_title: "FAQ — Allimgtools"
    meta_description: "Questions fréquemment posées sur Allimgtools — outils d'image gratuits, offre Pro, confidentialité et plus encore."
    title: "Questions fréquemment posées"
    contact: "Encore des questions ?"
    contact_link: "Contactez-nous"
    general:
      heading: "Général"
      q1: "Allimgtools est-il gratuit ?"
      a1: "Oui. Les 6 outils d'image sont entièrement gratuits, sans compte requis. Les utilisateurs gratuits peuvent traiter jusqu'à 10 fichiers à la fois, avec un maximum de 10 Mo par fichier."
      q2: "Dois-je créer un compte ?"
      a2: "Non. Vous pouvez utiliser tous les outils sans vous inscrire. Un compte n'est nécessaire que si vous souhaitez passer à l'offre Pro."
      q3: "Quels formats de fichiers sont pris en charge ?"
      a3: "Nous prenons en charge JPEG, PNG, GIF, WebP et AVIF."
    pro_plan:
      heading: "Offre Pro"
      q1: "Qu'est-ce que l'offre Pro inclut ?"
      a1: "Les utilisateurs Pro peuvent téléverser jusqu'à 30 fichiers par lot (contre 10 avec l'offre gratuite) et traiter des fichiers jusqu'à 30 Mo chacun (contre 10 Mo avec l'offre gratuite). Tout le reste est identique."
      q2: "Comment puis-je payer ?"
      a2: "Les paiements sont traités de manière sécurisée par Paddle. Nous acceptons toutes les principales cartes de crédit et de débit."
      q3: "Puis-je annuler à tout moment ?"
      a3_html: "Oui. Vous pouvez annuler à tout moment depuis votre <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">Mon espace</a>. Sans justification requise."
      q4: "Que se passe-t-il si j'annule ?"
      a4: "Votre accès Pro continue jusqu'à la fin de votre période de facturation en cours. Vous ne serez plus débité après cela."
      q5: "Puis-je obtenir un remboursement ?"
      a5_html: "Veuillez nous contacter à <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a> et nous ferons de notre mieux pour vous aider."
      q6: "J'ai souscrit mais les fonctionnalités Pro ne sont pas disponibles."
      a6_html: "Rendez-vous sur <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">Mon espace</a> et cliquez sur &ldquo;Déjà payé ? Vérifier l'abonnement&rdquo;. Cela synchronise manuellement votre statut d'abonnement. Si le problème persiste, contactez <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a>."
    privacy:
      heading: "Confidentialité et fichiers"
      q1: "Mes fichiers téléversés sont-ils stockés ?"
      a1: "Non. Les fichiers sont traités immédiatement et automatiquement supprimés dans les 3 heures. Nous ne stockons, n'analysons ni ne partageons jamais vos images."
      q2: "Combien de temps les fichiers traités sont-ils disponibles au téléchargement ?"
      a2: "Les liens de téléchargement sont disponibles pendant 3 heures après le traitement."
    account:
      heading: "Compte"
      q1: "Comment puis-je me connecter ?"
      a1: "Nous utilisons la connexion Google. Cliquez sur &ldquo;Se connecter&rdquo; et connectez-vous avec votre compte Google — aucun mot de passe requis."
      q2: "Que se passe-t-il si je supprime mon compte ?"
      a2: "Votre compte et toutes les données associées sont définitivement supprimés d'Allimgtools. Si vous avez un abonnement Pro actif, veuillez d'abord l'annuler depuis Mon espace."

