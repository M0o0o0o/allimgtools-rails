  faq:
    meta_title: "FAQ — Allimgtools"
    meta_description: "Pertanyaan umum tentang Allimgtools — alat gambar gratis, plan Pro, privasi, dan lainnya."
    title: "Pertanyaan yang Sering Diajukan"
    contact: "Masih punya pertanyaan?"
    contact_link: "Hubungi kami"
    general:
      heading: "Umum"
      q1: "Apakah Allimgtools gratis digunakan?"
      a1: "Ya. Semua 6 alat gambar sepenuhnya gratis tanpa perlu akun. Pengguna gratis dapat memproses hingga 10 file sekaligus, dengan maksimal 10MB per file."
      q2: "Apakah saya perlu membuat akun?"
      a2: "Tidak. Anda bisa menggunakan semua alat tanpa mendaftar. Akun hanya diperlukan jika ingin upgrade ke Pro."
      q3: "Format file apa saja yang didukung?"
      a3: "Kami mendukung JPEG, PNG, GIF, WebP, dan AVIF."
    pro_plan:
      heading: "Plan Pro"
      q1: "Apa saja yang termasuk dalam plan Pro?"
      a1: "Pengguna Pro dapat mengupload hingga 30 file per batch (vs. 10 di Free) dan memproses file hingga 30MB per file (vs. 10MB di Free). Semua fitur lainnya sama."
      q2: "Bagaimana cara membayar?"
      a2: "Pembayaran diproses secara aman oleh Paddle. Kami menerima semua kartu kredit dan debit utama."
      q3: "Bisakah saya batalkan kapan saja?"
      a3_html: "Ya. Anda bisa membatalkan kapan saja dari <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">Halaman Saya</a>. Tanpa pertanyaan apapun."
      q4: "Apa yang terjadi ketika saya membatalkan?"
      a4: "Akses Pro Anda berlanjut hingga akhir periode penagihan saat ini. Anda tidak akan ditagih lagi setelah itu."
      q5: "Bisakah saya mendapat pengembalian dana?"
      a5_html: "Silakan hubungi kami di <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a> dan kami akan berusaha semaksimal mungkin untuk membantu."
      q6: "Saya sudah berlangganan tapi fitur Pro belum tersedia."
      a6_html: "Buka <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">Halaman Saya</a> dan klik &ldquo;Sudah bayar? Verifikasi langganan&rdquo;. Ini akan menyinkronkan status langganan Anda secara manual. Jika masalah berlanjut, hubungi <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a>."
    privacy:
      heading: "Privasi & File"
      q1: "Apakah file yang saya upload disimpan?"
      a1: "Tidak. File diproses segera dan dihapus otomatis dalam 3 jam. Kami tidak pernah menyimpan, menganalisis, atau membagikan gambar Anda."
      q2: "Berapa lama file yang diproses tersedia untuk diunduh?"
      a2: "Tautan unduhan tersedia selama 3 jam setelah diproses."
    account:
      heading: "Akun"
      q1: "Bagaimana cara masuk?"
      a1: "Kami menggunakan Google Sign-In. Klik &ldquo;Masuk&rdquo; dan login dengan akun Google Anda — tidak perlu kata sandi."
      q2: "Apa yang terjadi jika saya menghapus akun?"
      a2: "Akun dan semua data terkait Anda akan dihapus secara permanen dari Allimgtools. Jika Anda memiliki langganan Pro aktif, harap batalkan terlebih dahulu dari Halaman Saya."

