  faq:
    meta_title: "FAQ — Allimgtools"
    meta_description: "Domande frequenti su Allimgtools — strumenti immagine gratuiti, piano Pro, privacy e altro ancora."
    title: "Domande frequenti"
    contact: "Hai ancora domande?"
    contact_link: "Contattaci"
    general:
      heading: "Generale"
      q1: "Allimgtools è gratuito?"
      a1: "Sì. Tutti i 6 strumenti immagine sono completamente gratuiti senza account richiesto. Gli utenti gratuiti possono elaborare fino a 10 file alla volta, con un massimo di 10 MB per file."
      q2: "Devo creare un account?"
      a2: "No. Puoi usare tutti gli strumenti senza registrarti. Un account è necessario solo se vuoi passare a Pro."
      q3: "Quali formati di file sono supportati?"
      a3: "Supportiamo JPEG, PNG, GIF, WebP e AVIF."
    pro_plan:
      heading: "Piano Pro"
      q1: "Cosa include il piano Pro?"
      a1: "Gli utenti Pro possono caricare fino a 30 file per batch (contro 10 nel piano gratuito) e elaborare file fino a 30 MB ciascuno (contro 10 MB nel piano gratuito). Tutto il resto è uguale."
      q2: "Come posso pagare?"
      a2: "I pagamenti vengono elaborati in modo sicuro da Paddle. Accettiamo tutte le principali carte di credito e di debito."
      q3: "Posso annullare in qualsiasi momento?"
      a3_html: "Sì. Puoi annullare in qualsiasi momento dalla tua <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">La mia pagina</a>. Senza domande."
      q4: "Cosa succede quando annullo?"
      a4: "Il tuo accesso Pro continua fino alla fine del tuo periodo di fatturazione attuale. Non ti verrà addebitato nulla dopo."
      q5: "Posso ottenere un rimborso?"
      a5_html: "Contattaci a <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a> e faremo del nostro meglio per aiutarti."
      q6: "Mi sono abbonato ma le funzionalità Pro non sono disponibili."
      a6_html: "Vai su <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">La mia pagina</a> e clicca su &ldquo;Hai già pagato? Verifica abbonamento&rdquo;. Questo sincronizza manualmente il tuo stato di abbonamento. Se il problema persiste, contatta <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a>."
    privacy:
      heading: "Privacy e file"
      q1: "I miei file caricati vengono memorizzati?"
      a1: "No. I file vengono elaborati immediatamente ed eliminati automaticamente entro 3 ore. Non memorizziamo, analizziamo né condividiamo mai le tue immagini."
      q2: "Per quanto tempo i file elaborati sono disponibili per il download?"
      a2: "I link per il download sono disponibili per 3 ore dopo l'elaborazione."
    account:
      heading: "Account"
      q1: "Come accedo?"
      a1: "Utilizziamo l'accesso Google. Clicca su &ldquo;Accedi&rdquo; e accedi con il tuo account Google — nessuna password richiesta."
      q2: "Cosa succede se elimino il mio account?"
      a2: "Il tuo account e tutti i dati associati vengono rimossi definitivamente da Allimgtools. Se hai un abbonamento Pro attivo, annullalo prima dalla tua pagina."

