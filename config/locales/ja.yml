  faq:
    meta_title: "よくある質問 — Allimgtools"
    meta_description: "Allimgtools に関するよくある質問 — 無料画像ツール、Proプラン、プライバシーなど。"
    title: "よくある質問"
    contact: "まだ疑問がありますか？"
    contact_link: "お問い合わせ"
    general:
      heading: "一般"
      q1: "Allimgtools は無料で使えますか？"
      a1: "はい。6つの画像ツールはすべてアカウント不要で完全無料です。無料ユーザーは一度に最大10ファイル、1ファイルあたり最大10MBまで処理できます。"
      q2: "アカウントを作成する必要がありますか？"
      a2: "いいえ。サインアップなしですべてのツールをご利用いただけます。アカウントが必要なのはProにアップグレードする場合のみです。"
      q3: "対応しているファイル形式は何ですか？"
      a3: "JPEG、PNG、GIF、WebP、AVIFに対応しています。"
    pro_plan:
      heading: "Proプラン"
      q1: "Proプランには何が含まれますか？"
      a1: "Proユーザーは1バッチあたり最大30ファイルをアップロードでき（無料プランは10ファイル）、1ファイルあたり最大30MBまで処理できます（無料プランは10MB）。その他はすべて同じです。"
      q2: "どのように支払えますか？"
      a2: "お支払いはPaddleが安全に処理します。主要なクレジットカードおよびデビットカードをすべてご利用いただけます。"
      q3: "いつでもキャンセルできますか？"
      a3_html: "はい。<a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">マイページ</a>からいつでもキャンセルできます。理由の説明は不要です。"
      q4: "キャンセルするとどうなりますか？"
      a4: "現在の請求期間の終了まで引き続きProをご利用いただけます。その後は請求されません。"
      q5: "返金を受けられますか？"
      a5_html: "<a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a> までご連絡ください。できる限り対応いたします。"
      q6: "サブスクリプションを購入しましたがProの機能が使えません。"
      a6_html: "<a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">マイページ</a>にアクセスして &ldquo;既にお支払い済みですか？サブスクリプションを確認&rdquo; をクリックしてください。これにより手動でサブスクリプションの状態が同期されます。問題が解決しない場合は <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a> までお問い合わせください。"
    privacy:
      heading: "プライバシーとファイル"
      q1: "アップロードしたファイルは保存されますか？"
      a1: "いいえ。ファイルはすぐに処理され、3時間以内に自動的に削除されます。お客様の画像を保存、分析、共有することは一切ありません。"
      q2: "処理されたファイルはどのくらいの期間ダウンロードできますか？"
      a2: "処理後3時間、ダウンロードリンクをご利用いただけます。"
    account:
      heading: "アカウント"
      q1: "どのようにログインしますか？"
      a1: "Googleサインインを使用しています。&ldquo;ログイン&rdquo; をクリックしてGoogleアカウントでサインインしてください。パスワードは不要です。"
      q2: "アカウントを削除するとどうなりますか？"
      a2: "アカウントおよびすべての関連データがAllimgtoolsから完全に削除されます。アクティブなProサブスクリプションがある場合は、先にマイページからキャンセルしてください。"

