  faq:
    meta_title: "FAQ — Allimgtools"
    meta_description: "Soalan lazim tentang Allimgtools — alat imej percuma, plan Pro, privasi, dan lain-lain."
    title: "Soalan Lazim"
    contact: "Masih ada soalan?"
    contact_link: "Hubungi kami"
    general:
      heading: "Umum"
      q1: "Adakah Allimgtools percuma digunakan?"
      a1: "Ya. Semua 6 alat imej adalah percuma sepenuhnya tanpa memerlukan akaun. Pengguna percuma boleh memproses sehingga 10 fail sekaligus, dengan maksimum 10MB setiap fail."
      q2: "Adakah saya perlu mencipta akaun?"
      a2: "Tidak. Anda boleh menggunakan semua alat tanpa mendaftar. Akaun hanya diperlukan jika anda ingin naik taraf ke Pro."
      q3: "Format fail apa yang disokong?"
      a3: "Kami menyokong JPEG, PNG, GIF, WebP, dan AVIF."
    pro_plan:
      heading: "Plan Pro"
      q1: "Apa yang termasuk dalam plan Pro?"
      a1: "Pengguna Pro boleh memuat naik sehingga 30 fail setiap kelompok (berbanding 10 dalam Percuma) dan memproses fail sehingga 30MB setiap fail (berbanding 10MB). Semua yang lain adalah sama."
      q2: "Bagaimana cara membayar?"
      a2: "Pembayaran diproses dengan selamat oleh Paddle. Kami menerima semua kad kredit dan debit utama."
      q3: "Bolehkah saya batalkan bila-bila masa?"
      a3_html: "Ya. Anda boleh membatalkan bila-bila masa dari <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">Halaman Saya</a>. Tiada soalan ditanya."
      q4: "Apa yang berlaku apabila saya membatalkan?"
      a4: "Akses Pro anda berterusan sehingga akhir tempoh pengebilan semasa. Anda tidak akan dicaj lagi selepas itu."
      q5: "Bolehkah saya mendapat bayaran balik?"
      a5_html: "Sila hubungi kami di <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a> dan kami akan cuba sebaik mungkin untuk membantu."
      q6: "Saya telah melanggan tetapi ciri Pro tidak tersedia."
      a6_html: "Pergi ke <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">Halaman Saya</a> dan klik &ldquo;Sudah bayar? Sahkan langganan&rdquo;. Ini menyegerakkan status langganan anda secara manual. Jika masalah berterusan, hubungi <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a>."
    privacy:
      heading: "Privasi & Fail"
      q1: "Adakah fail yang saya muat naik disimpan?"
      a1: "Tidak. Fail diproses serta-merta dan dipadamkan secara automatik dalam masa 3 jam. Kami tidak pernah menyimpan, menganalisis, atau berkongsi imej anda."
      q2: "Berapa lama fail yang diproses tersedia untuk dimuat turun?"
      a2: "Pautan muat turun tersedia selama 3 jam selepas pemprosesan."
    account:
      heading: "Akaun"
      q1: "Bagaimana cara log masuk?"
      a1: "Kami menggunakan Google Sign-In. Klik &ldquo;Log masuk&rdquo; dan daftar masuk dengan akaun Google anda — tiada kata laluan diperlukan."
      q2: "Apa yang berlaku jika saya memadam akaun?"
      a2: "Akaun dan semua data berkaitan anda akan dipadamkan secara kekal dari Allimgtools. Jika anda mempunyai langganan Pro yang aktif, sila batalkan dahulu dari Halaman Saya."

