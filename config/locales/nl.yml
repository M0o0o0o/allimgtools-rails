  faq:
    meta_title: "FAQ — Allimgtools"
    meta_description: "Veelgestelde vragen over Allimgtools — gratis afbeeldingstools, Pro-abonnement, privacy en meer."
    title: "Veelgestelde vragen"
    contact: "Heeft u nog vragen?"
    contact_link: "Neem contact op"
    general:
      heading: "Algemeen"
      q1: "Is Allimgtools gratis?"
      a1: "Ja. Alle 6 afbeeldingstools zijn volledig gratis zonder account vereist. Gratis gebruikers kunnen tot 10 bestanden tegelijk verwerken, met een maximum van 10 MB per bestand."
      q2: "Moet ik een account aanmaken?"
      a2: "Nee. U kunt alle tools gebruiken zonder u aan te melden. Een account is alleen nodig als u wilt upgraden naar Pro."
      q3: "Welke bestandsformaten worden ondersteund?"
      a3: "Wij ondersteunen JPEG, PNG, GIF, WebP en AVIF."
    pro_plan:
      heading: "Pro-abonnement"
      q1: "Wat bevat het Pro-abonnement?"
      a1: "Pro-gebruikers kunnen tot 30 bestanden per batch uploaden (tegenover 10 bij het gratis abonnement) en bestanden verwerken tot 30 MB elk (tegenover 10 MB bij het gratis abonnement). Al het andere is hetzelfde."
      q2: "Hoe kan ik betalen?"
      a2: "Betalingen worden veilig verwerkt via Paddle. Wij accepteren alle gangbare credit- en debetkaarten."
      q3: "Kan ik op elk moment opzeggen?"
      a3_html: "Ja. U kunt op elk moment opzeggen via uw <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">Mijn pagina</a>. Geen vragen gesteld."
      q4: "Wat gebeurt er als ik opzeg?"
      a4: "Uw Pro-toegang loopt door tot het einde van uw huidige factureringsperiode. Daarna worden er geen kosten meer in rekening gebracht."
      q5: "Kan ik een terugbetaling krijgen?"
      a5_html: "Neem contact met ons op via <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a> en we doen ons best om u te helpen."
      q6: "Ik heb een abonnement afgesloten maar Pro-functies zijn niet beschikbaar."
      a6_html: "Ga naar <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">Mijn pagina</a> en klik op &ldquo;Al betaald? Abonnement verifiëren&rdquo;. Dit synchroniseert uw abonnementsstatus handmatig. Als het probleem aanhoudt, neem dan contact op met <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a>."
    privacy:
      heading: "Privacy & bestanden"
      q1: "Worden mijn geüploade bestanden opgeslagen?"
      a1: "Nee. Bestanden worden direct verwerkt en binnen 3 uur automatisch verwijderd. Wij slaan uw afbeeldingen nooit op, analyseren ze niet en delen ze niet."
      q2: "Hoe lang zijn verwerkte bestanden beschikbaar voor download?"
      a2: "Downloadlinks zijn 3 uur na de verwerking beschikbaar."
    account:
      heading: "Account"
      q1: "Hoe log ik in?"
      a1: "Wij gebruiken Google-aanmelding. Klik op &ldquo;Inloggen&rdquo; en meld u aan met uw Google-account — geen wachtwoord vereist."
      q2: "Wat gebeurt er als ik mijn account verwijder?"
      a2: "Uw account en alle bijbehorende gegevens worden permanent verwijderd uit Allimgtools. Als u een actief Pro-abonnement heeft, annuleer dit dan eerst via Mijn pagina."

