  faq:
    meta_title: "FAQ — Allimgtools"
    meta_description: "Często zadawane pytania o Allimgtools — darmowe narzędzia do obrazów, plan Pro, prywatność i więcej."
    title: "Często zadawane pytania"
    contact: "Masz jeszcze pytania?"
    contact_link: "Skontaktuj się z nami"
    general:
      heading: "Ogólne"
      q1: "Czy Allimgtools jest darmowy?"
      a1: "Tak. Wszystkie 6 narzędzi do obrazów jest całkowicie darmowych i nie wymaga konta. Darmowi użytkownicy mogą przetwarzać do 10 plików jednocześnie, maksymalnie 10 MB każdy."
      q2: "Czy muszę zakładać konto?"
      a2: "Nie. Możesz używać wszystkich narzędzi bez rejestracji. Konto jest potrzebne tylko do przejścia na plan Pro."
      q3: "Jakie formaty plików są obsługiwane?"
      a3: "Obsługujemy JPEG, PNG, GIF, WebP i AVIF."
    pro_plan:
      heading: "Plan Pro"
      q1: "Co zawiera plan Pro?"
      a1: "Użytkownicy Pro mogą przesyłać do 30 plików na partię (zamiast 10 w planie darmowym) i przetwarzać pliki do 30 MB każdy (zamiast 10 MB w planie darmowym). Wszystko inne jest takie samo."
      q2: "Jak mogę zapłacić?"
      a2: "Płatności są bezpiecznie przetwarzane przez Paddle. Akceptujemy wszystkie główne karty kredytowe i debetowe."
      q3: "Czy mogę anulować w dowolnym momencie?"
      a3_html: "Tak. Możesz anulować w dowolnym momencie ze swojej <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">Mojej strony</a>. Bez pytań."
      q4: "Co się dzieje po anulowaniu?"
      a4: "Twój dostęp do Pro trwa do końca bieżącego okresu rozliczeniowego. Po tym czasie nie będziesz już obciążany."
      q5: "Czy mogę otrzymać zwrot?"
      a5_html: "Skontaktuj się z nami pod adresem <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a>, a my dołożymy wszelkich starań, aby pomóc."
      q6: "Wykupiłem subskrypcję, ale funkcje Pro nie są dostępne."
      a6_html: "Przejdź na <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">Moją stronę</a> i kliknij &ldquo;Już zapłaciłeś? Zweryfikuj subskrypcję&rdquo;. Spowoduje to ręczną synchronizację statusu subskrypcji. Jeśli problem nadal występuje, skontaktuj się z <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a>."
    privacy:
      heading: "Prywatność i pliki"
      q1: "Czy moje przesłane pliki są przechowywane?"
      a1: "Nie. Pliki są przetwarzane natychmiast i automatycznie usuwane w ciągu 3 godzin. Nigdy nie przechowujemy, nie analizujemy ani nie udostępniamy Twoich obrazów."
      q2: "Jak długo przetworzone pliki są dostępne do pobrania?"
      a2: "Linki do pobierania są dostępne przez 3 godziny po przetworzeniu."
    account:
      heading: "Konto"
      q1: "Jak się zalogować?"
      a1: "Korzystamy z logowania przez Google. Kliknij &ldquo;Zaloguj się&rdquo; i zaloguj się swoim kontem Google — hasło nie jest wymagane."
      q2: "Co się dzieje po usunięciu konta?"
      a2: "Twoje konto i wszystkie powiązane dane zostaną trwale usunięte z Allimgtools. Jeśli masz aktywną subskrypcję Pro, najpierw ją anuluj z Mojej strony."

