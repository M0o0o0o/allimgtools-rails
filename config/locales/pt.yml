  faq:
    meta_title: "FAQ — Allimgtools"
    meta_description: "Perguntas frequentes sobre Allimgtools — ferramentas de imagem gratuitas, plano Pro, privacidade e mais."
    title: "Perguntas frequentes"
    contact: "Ainda tem dúvidas?"
    contact_link: "Entre em contato"
    general:
      heading: "Geral"
      q1: "O Allimgtools é gratuito?"
      a1: "Sim. Todas as 6 ferramentas de imagem são completamente gratuitas sem necessidade de conta. Usuários gratuitos podem processar até 10 arquivos por vez, com no máximo 10 MB por arquivo."
      q2: "Preciso criar uma conta?"
      a2: "Não. Você pode usar todas as ferramentas sem se cadastrar. Uma conta só é necessária se quiser fazer upgrade para Pro."
      q3: "Quais formatos de arquivo são suportados?"
      a3: "Suportamos JPEG, PNG, GIF, WebP e AVIF."
    pro_plan:
      heading: "Plano Pro"
      q1: "O que o plano Pro inclui?"
      a1: "Usuários Pro podem enviar até 30 arquivos por lote (contra 10 no plano gratuito) e processar arquivos de até 30 MB cada (contra 10 MB no plano gratuito). Todo o resto é igual."
      q2: "Como posso pagar?"
      a2: "Os pagamentos são processados com segurança pelo Paddle. Aceitamos todos os principais cartões de crédito e débito."
      q3: "Posso cancelar a qualquer momento?"
      a3_html: "Sim. Você pode cancelar a qualquer momento pela sua <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">Minha página</a>. Sem perguntas."
      q4: "O que acontece quando eu cancelar?"
      a4: "Seu acesso Pro continua até o fim do seu período de cobrança atual. Você não será cobrado novamente depois disso."
      q5: "Posso obter um reembolso?"
      a5_html: "Entre em contato conosco em <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a> e faremos o possível para ajudá-lo."
      q6: "Assinei mas as funcionalidades Pro não estão disponíveis."
      a6_html: "Acesse <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">Minha página</a> e clique em &ldquo;Já pagou? Verificar assinatura&rdquo;. Isso sincroniza manualmente o status da sua assinatura. Se o problema persistir, contate <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a>."
    privacy:
      heading: "Privacidade e arquivos"
      q1: "Meus arquivos enviados são armazenados?"
      a1: "Não. Os arquivos são processados imediatamente e excluídos automaticamente em até 3 horas. Nunca armazenamos, analisamos ou compartilhamos suas imagens."
      q2: "Por quanto tempo os arquivos processados ficam disponíveis para download?"
      a2: "Os links de download ficam disponíveis por 3 horas após o processamento."
    account:
      heading: "Conta"
      q1: "Como faço login?"
      a1: "Usamos o login do Google. Clique em &ldquo;Entrar&rdquo; e acesse com sua conta Google — sem senha necessária."
      q2: "O que acontece se eu excluir minha conta?"
      a2: "Sua conta e todos os dados associados são removidos permanentemente do Allimgtools. Se você tiver uma assinatura Pro ativa, cancele-a primeiro pela Minha página."

