    meta_description: "Часто задаваемые вопросы об Allimgtools — бесплатные инструменты для изображений, план Pro, конфиденциальность и многое другое."
    title: "Часто задаваемые вопросы"
    contact: "Остались вопросы?"
    contact_link: "Связаться с нами"
    general:
      heading: "Общие вопросы"
      q1: "Allimgtools бесплатный?"
      a1: "Да. Все 6 инструментов для изображений полностью бесплатны и не требуют аккаунта. Бесплатные пользователи могут обрабатывать до 10 файлов одновременно, максимум 10 МБ каждый."
      q2: "Нужно ли создавать аккаунт?"
      a2: "Нет. Все инструменты доступны без регистрации. Аккаунт нужен только для перехода на Pro."
      q3: "Какие форматы файлов поддерживаются?"
      a3: "Мы поддерживаем JPEG, PNG, GIF, WebP и AVIF."
    pro_plan:
      heading: "Тариф Pro"
      q1: "Что входит в тариф Pro?"
      a1: "Пользователи Pro могут загружать до 30 файлов за раз (против 10 на бесплатном тарифе) и обрабатывать файлы до 30 МБ каждый (против 10 МБ на бесплатном тарифе). Всё остальное одинаково."
      q2: "Как можно оплатить?"
      a2: "Платежи безопасно обрабатываются через Paddle. Мы принимаем все основные кредитные и дебетовые карты."
      q3: "Можно ли отменить подписку в любое время?"
      a3_html: "Да. Вы можете отменить подписку в любое время на странице <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">Мой профиль</a>. Без лишних вопросов."
      q4: "Что происходит после отмены?"
      a4: "Доступ к Pro сохраняется до конца текущего расчётного периода. После этого никаких списаний не будет."
      q5: "Можно ли получить возврат средств?"
      a5_html: "Напишите нам на <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a>, и мы постараемся помочь."
      q6: "Я оформил подписку, но функции Pro недоступны."
      a6_html: "Перейдите на страницу <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">Мой профиль</a> и нажмите &ldquo;Уже оплатили? Проверить подписку&rdquo;. Это вручную синхронизирует статус вашей подписки. Если проблема не исчезла, напишите на <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a>."
    privacy:
      heading: "Конфиденциальность и файлы"
      q1: "Хранятся ли мои загруженные файлы?"
      a1: "Нет. Файлы обрабатываются немедленно и автоматически удаляются в течение 3 часов. Мы никогда не храним, не анализируем и не передаём ваши изображения."
      q2: "Как долго обработанные файлы доступны для скачивания?"
      a2: "Ссылки для скачивания действительны в течение 3 часов после обработки."
    account:
      heading: "Аккаунт"
      q1: "Как войти в систему?"
      a1: "Мы используем вход через Google. Нажмите &ldquo;Войти&rdquo; и авторизуйтесь с помощью своего аккаунта Google — пароль не требуется."
      q2: "Что произойдёт, если я удалю аккаунт?"
      a2: "Ваш аккаунт и все связанные данные будут безвозвратно удалены из Allimgtools. Если у вас активная подписка Pro, сначала отмените её на странице Мой профиль."

