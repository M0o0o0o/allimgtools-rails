  faq:
    meta_title: "FAQ — Allimgtools"
    meta_description: "Vanliga frågor om Allimgtools — gratis bildverktyg, Pro-plan, integritet och mer."
    title: "Vanliga frågor"
    contact: "Har du fler frågor?"
    contact_link: "Kontakta oss"
    general:
      heading: "Allmänt"
      q1: "Är Allimgtools gratis att använda?"
      a1: "Ja. Alla 6 bildverktyg är helt gratis utan konto. Gratisanvändare kan bearbeta upp till 10 filer åt gången, med maximalt 10MB per fil."
      q2: "Behöver jag skapa ett konto?"
      a2: "Nej. Du kan använda alla verktyg utan att registrera dig. Ett konto behövs bara om du vill uppgradera till Pro."
      q3: "Vilka filformat stöds?"
      a3: "Vi stöder JPEG, PNG, GIF, WebP och AVIF."
    pro_plan:
      heading: "Pro-plan"
      q1: "Vad ingår i Pro-planen?"
      a1: "Pro-användare kan ladda upp upp till 30 filer per batch (mot 10 i Gratis) och bearbeta filer upp till 30MB vardera (mot 10MB i Gratis). Allt annat är likadant."
      q2: "Hur betalar jag?"
      a2: "Betalningar behandlas säkert av Paddle. Vi accepterar alla vanliga kredit- och betalkort."
      q3: "Kan jag avsluta när som helst?"
      a3_html: "Ja. Du kan avsluta när som helst från din <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">Min sida</a>. Inga frågor ställs."
      q4: "Vad händer när jag avslutar?"
      a4: "Din Pro-åtkomst fortsätter till slutet av din aktuella faktureringsperiod. Du debiteras inte igen efter det."
      q5: "Kan jag få återbetalning?"
      a5_html: "Kontakta oss på <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a> så gör vi vårt bästa för att hjälpa dig."
      q6: "Jag prenumererar men Pro-funktioner är inte tillgängliga."
      a6_html: "Gå till <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">Min sida</a> och klicka på &ldquo;Redan betalat? Verifiera prenumeration&rdquo;. Detta synkroniserar din prenumerationsstatus manuellt. Om problemet kvarstår, kontakta <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a>."
    privacy:
      heading: "Integritet & Filer"
      q1: "Sparas mina uppladdade filer?"
      a1: "Nej. Filer bearbetas omedelbart och raderas automatiskt inom 3 timmar. Vi lagrar, analyserar eller delar aldrig dina bilder."
      q2: "Hur länge är bearbetade filer tillgängliga för nedladdning?"
      a2: "Nedladdningslänkar är tillgängliga i 3 timmar efter bearbetning."
    account:
      heading: "Konto"
      q1: "Hur loggar jag in?"
      a1: "Vi använder Google Sign-In. Klicka på &ldquo;Logga in&rdquo; och logga in med ditt Google-konto — inget lösenord krävs."
      q2: "Vad händer om jag tar bort mitt konto?"
      a2: "Ditt konto och alla tillhörande data tas bort permanent från Allimgtools. Om du har en aktiv Pro-prenumeration, avsluta den först från Min sida."

