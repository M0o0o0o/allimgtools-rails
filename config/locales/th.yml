  faq:
    meta_title: "FAQ — Allimgtools"
    meta_description: "คำถามที่พบบ่อยเกี่ยวกับ Allimgtools — เครื่องมือรูปภาพฟรี แผน Pro ความเป็นส่วนตัว และอื่นๆ"
    title: "คำถามที่พบบ่อย"
    contact: "ยังมีคำถามอยู่ใช่ไหม?"
    contact_link: "ติดต่อเรา"
    general:
      heading: "ทั่วไป"
      q1: "Allimgtools ใช้งานฟรีหรือเปล่า?"
      a1: "ใช่ เครื่องมือรูปภาพทั้ง 6 อย่างใช้งานได้ฟรีโดยไม่ต้องมีบัญชี ผู้ใช้ฟรีสามารถประมวลผลได้สูงสุด 10 ไฟล์ต่อครั้ง และสูงสุด 10MB ต่อไฟล์"
      q2: "ฉันต้องสร้างบัญชีไหม?"
      a2: "ไม่ต้อง คุณสามารถใช้เครื่องมือทั้งหมดได้โดยไม่ต้องสมัครสมาชิก บัญชีจำเป็นเฉพาะเมื่อต้องการอัปเกรดเป็น Pro เท่านั้น"
      q3: "รองรับรูปแบบไฟล์อะไรบ้าง?"
      a3: "รองรับ JPEG, PNG, GIF, WebP และ AVIF"
    pro_plan:
      heading: "แผน Pro"
      q1: "แผน Pro รวมอะไรบ้าง?"
      a1: "ผู้ใช้ Pro สามารถอัปโหลดได้สูงสุด 30 ไฟล์ต่อครั้ง (เทียบกับ 10 ในแผนฟรี) และประมวลผลไฟล์ได้สูงสุด 30MB ต่อไฟล์ (เทียบกับ 10MB) ส่วนอื่นๆ เหมือนกันทุกอย่าง"
      q2: "ชำระเงินอย่างไร?"
      a2: "การชำระเงินดำเนินการอย่างปลอดภัยโดย Paddle รองรับบัตรเครดิตและบัตรเดบิตหลักทุกประเภท"
      q3: "ยกเลิกได้ทุกเมื่อไหม?"
      a3_html: "ได้ คุณสามารถยกเลิกได้ทุกเมื่อจาก <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">หน้าของฉัน</a> โดยไม่มีเงื่อนไข"
      q4: "เกิดอะไรขึ้นเมื่อยกเลิก?"
      a4: "การเข้าถึง Pro ของคุณจะดำเนินต่อไปจนสิ้นสุดรอบการเรียกเก็บเงินปัจจุบัน และจะไม่ถูกเรียกเก็บเงินอีกหลังจากนั้น"
      q5: "ขอคืนเงินได้ไหม?"
      a5_html: "กรุณาติดต่อเราที่ <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a> แล้วเราจะพยายามช่วยเหลืออย่างเต็มที่"
      q6: "สมัครแล้วแต่ฟีเจอร์ Pro ยังไม่ใช้งานได้"
      a6_html: "ไปที่ <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">หน้าของฉัน</a> แล้วคลิก &ldquo;ชำระเงินแล้ว? ตรวจสอบการสมัคร&rdquo; เพื่อซิงค์สถานะการสมัครด้วยตนเอง หากปัญหายังคงอยู่ กรุณาติดต่อ <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a>"
    privacy:
      heading: "ความเป็นส่วนตัวและไฟล์"
      q1: "ไฟล์ที่ฉันอัปโหลดจะถูกเก็บไว้หรือเปล่า?"
      a1: "ไม่ ไฟล์จะถูกประมวลผลทันทีและลบโดยอัตโนมัติภายใน 3 ชั่วโมง เราไม่เคยเก็บ วิเคราะห์ หรือแชร์รูปภาพของคุณ"
      q2: "ไฟล์ที่ประมวลผลแล้วสามารถดาวน์โหลดได้นานแค่ไหน?"
      a2: "ลิงก์ดาวน์โหลดพร้อมใช้งานเป็นเวลา 3 ชั่วโมงหลังจากประมวลผล"
    account:
      heading: "บัญชี"
      q1: "เข้าสู่ระบบอย่างไร?"
      a1: "เราใช้ Google Sign-In คลิก &ldquo;เข้าสู่ระบบ&rdquo; แล้วลงชื่อเข้าใช้ด้วยบัญชี Google ของคุณ — ไม่ต้องใช้รหัสผ่าน"
      q2: "เกิดอะไรขึ้นถ้าฉันลบบัญชี?"
      a2: "บัญชีและข้อมูลที่เกี่ยวข้องทั้งหมดของคุณจะถูกลบออกจาก Allimgtools อย่างถาวร หากคุณมีแผน Pro อยู่ กรุณายกเลิกจากหน้าของฉันก่อน"

