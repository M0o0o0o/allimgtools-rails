  faq:
    meta_title: "SSS — Allimgtools"
    meta_description: "Allimgtools hakkında sık sorulan sorular — ücretsiz görsel araçlar, Pro plan, gizlilik ve daha fazlası."
    title: "Sık Sorulan Sorular"
    contact: "Hâlâ sorunuz mu var?"
    contact_link: "Bize ulaşın"
    general:
      heading: "Genel"
      q1: "Allimgtools ücretsiz mi?"
      a1: "Evet. 6 görsel aracın tamamı hesap gerektirmeksizin tamamen ücretsizdir. Ücretsiz kullanıcılar aynı anda en fazla 10 dosyayı, dosya başına en fazla 10MB olacak şekilde işleyebilir."
      q2: "Hesap oluşturmam gerekiyor mu?"
      a2: "Hayır. Tüm araçları kayıt olmadan kullanabilirsiniz. Hesap yalnızca Pro'ya geçmek istiyorsanız gereklidir."
      q3: "Hangi dosya formatları destekleniyor?"
      a3: "JPEG, PNG, GIF, WebP ve AVIF desteklenmektedir."
    pro_plan:
      heading: "Pro Plan"
      q1: "Pro plan neler içeriyor?"
      a1: "Pro kullanıcılar toplu işlemde en fazla 30 dosya yükleyebilir (Ücretsiz'de 10) ve dosya başına 30MB'a kadar işlem yapabilir (Ücretsiz'de 10MB). Diğer her şey aynıdır."
      q2: "Nasıl ödeme yapabilirim?"
      a2: "Ödemeler Paddle tarafından güvenli şekilde işlenir. Tüm büyük kredi ve banka kartları kabul edilmektedir."
      q3: "İstediğim zaman iptal edebilir miyim?"
      a3_html: "Evet. <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">Sayfam</a>'dan istediğiniz zaman iptal edebilirsiniz. Herhangi bir soru sorulmaz."
      q4: "İptal ettiğimde ne olur?"
      a4: "Pro erişiminiz mevcut faturalama döneminin sonuna kadar devam eder. Bundan sonra tekrar ücretlendirilmezsiniz."
      q5: "Para iadesi alabilir miyim?"
      a5_html: "<a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a> adresine ulaşın, elimizden geleni yapacağız."
      q6: "Abone oldum ama Pro özellikleri kullanılamıyor."
      a6_html: "<a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">Sayfam</a>'a gidin ve &ldquo;Ödeme yaptınız mı? Aboneliği doğrulayın&rdquo; seçeneğine tıklayın. Bu işlem abonelik durumunuzu manuel olarak eşitler. Sorun devam ederse <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a> ile iletişime geçin."
    privacy:
      heading: "Gizlilik ve Dosyalar"
      q1: "Yüklediğim dosyalar saklanıyor mu?"
      a1: "Hayır. Dosyalar hemen işlenir ve 3 saat içinde otomatik olarak silinir. Görsellerinizi asla saklamaz, analiz etmez veya paylaşmayız."
      q2: "İşlenen dosyalar ne kadar süre indirilebilir?"
      a2: "İndirme bağlantıları işlemden sonra 3 saat boyunca kullanılabilir."
    account:
      heading: "Hesap"
      q1: "Nasıl giriş yapabilirim?"
      a1: "Google ile Giriş kullanıyoruz. &ldquo;Giriş yap&rdquo; seçeneğine tıklayın ve Google hesabınızla oturum açın — şifre gerekmez."
      q2: "Hesabımı silersem ne olur?"
      a2: "Hesabınız ve ilişkili tüm veriler Allimgtools'tan kalıcı olarak kaldırılır. Aktif bir Pro aboneliğiniz varsa önce Sayfam'dan iptal etmenizi öneririz."

