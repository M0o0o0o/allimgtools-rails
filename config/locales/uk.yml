    general:
      heading: "Загальне"
      q1: "Чи безкоштовний Allimgtools?"
      a1: "Так. Усі 6 інструментів для зображень абсолютно безкоштовні без потреби в акаунті. Безкоштовні користувачі можуть обробляти до 10 файлів за раз із максимальним розміром 10MB на файл."
      q2: "Чи потрібно мені створювати акаунт?"
      a2: "Ні. Ви можете використовувати всі інструменти без реєстрації. Акаунт потрібен лише якщо ви хочете оновитися до Pro."
      q3: "Які формати файлів підтримуються?"
      a3: "Ми підтримуємо JPEG, PNG, GIF, WebP та AVIF."
    pro_plan:
      heading: "Plan Pro"
      q1: "Що входить до плану Pro?"
      a1: "Користувачі Pro можуть завантажувати до 30 файлів за раз (проти 10 у безкоштовному) і обробляти файли до 30MB кожен (проти 10MB). Все інше однакове."
      q2: "Як здійснити оплату?"
      a2: "Платежі безпечно обробляються через Paddle. Ми приймаємо всі основні кредитні та дебетові картки."
      q3: "Чи можу я скасувати будь-коли?"
      a3_html: "Так. Ви можете скасувати будь-коли на своїй <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">Моїй сторінці</a>. Ніяких питань."
      q4: "Що відбувається, коли я скасовую?"
      a4: "Ваш доступ до Pro продовжується до кінця поточного платіжного періоду. Після цього з вас більше нічого не стягується."
      q5: "Чи можу я отримати відшкодування?"
      a5_html: "Будь ласка, зв'яжіться з нами за адресою <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a>, і ми зробимо все можливе, щоб допомогти."
      q6: "Я підписався, але функції Pro недоступні."
      a6_html: "Перейдіть на <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">Мою сторінку</a> та натисніть &ldquo;Вже оплатили? Перевірити підписку&rdquo;. Це синхронізує статус вашої підписки вручну. Якщо проблема не зникає, зверніться до <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a>."
    privacy:
      heading: "Конфіденційність і файли"
      q1: "Чи зберігаються завантажені мною файли?"
      a1: "Ні. Файли обробляються одразу та автоматично видаляються протягом 3 годин. Ми ніколи не зберігаємо, не аналізуємо і не передаємо ваші зображення."
      q2: "Як довго доступні для завантаження оброблені файли?"
      a2: "Посилання для завантаження доступні протягом 3 годин після обробки."
    account:
      heading: "Акаунт"
      q1: "Як увійти?"
      a1: "Ми використовуємо Google Sign-In. Натисніть &ldquo;Увійти&rdquo; та увійдіть за допомогою свого облікового запису Google — пароль не потрібен."
      q2: "Що станеться, якщо я видалю свій акаунт?"
      a2: "Ваш акаунт і всі пов'язані дані будуть назавжди видалені з Allimgtools. Якщо у вас є активна підписка Pro, спочатку скасуйте її на Моїй сторінці."

