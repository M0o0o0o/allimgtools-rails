  faq:
    meta_title: "FAQ — Allimgtools"
    meta_description: "Câu hỏi thường gặp về Allimgtools — công cụ ảnh miễn phí, gói Pro, quyền riêng tư và nhiều hơn nữa."
    title: "Câu hỏi thường gặp"
    contact: "Vẫn còn thắc mắc?"
    contact_link: "Liên hệ với chúng tôi"
    general:
      heading: "Tổng quan"
      q1: "Allimgtools có miễn phí không?"
      a1: "Có. Tất cả 6 công cụ ảnh đều hoàn toàn miễn phí, không cần tài khoản. Người dùng miễn phí có thể xử lý tối đa 10 file mỗi lần, tối đa 10MB mỗi file."
      q2: "Tôi có cần tạo tài khoản không?"
      a2: "Không. Bạn có thể dùng tất cả công cụ mà không cần đăng ký. Tài khoản chỉ cần thiết nếu bạn muốn nâng cấp lên Pro."
      q3: "Hỗ trợ những định dạng file nào?"
      a3: "Chúng tôi hỗ trợ JPEG, PNG, GIF, WebP và AVIF."
    pro_plan:
      heading: "Gói Pro"
      q1: "Gói Pro bao gồm những gì?"
      a1: "Người dùng Pro có thể tải lên tối đa 30 file mỗi lần (so với 10 ở gói miễn phí) và xử lý file tối đa 30MB mỗi file (so với 10MB). Mọi thứ khác đều giống nhau."
      q2: "Tôi thanh toán như thế nào?"
      a2: "Thanh toán được xử lý an toàn bởi Paddle. Chúng tôi chấp nhận tất cả các loại thẻ tín dụng và thẻ ghi nợ phổ biến."
      q3: "Tôi có thể hủy bất cứ lúc nào không?"
      a3_html: "Có. Bạn có thể hủy bất cứ lúc nào từ <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">Trang của tôi</a>. Không cần giải thích."
      q4: "Điều gì xảy ra khi tôi hủy?"
      a4: "Quyền truy cập Pro của bạn tiếp tục đến hết kỳ thanh toán hiện tại. Bạn sẽ không bị tính phí sau đó."
      q5: "Tôi có thể hoàn tiền không?"
      a5_html: "Vui lòng liên hệ chúng tôi tại <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a> và chúng tôi sẽ cố gắng hết sức để hỗ trợ bạn."
      q6: "Tôi đã đăng ký nhưng tính năng Pro chưa khả dụng."
      a6_html: "Vào <a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">Trang của tôi</a> và nhấn &ldquo;Đã thanh toán? Xác minh đăng ký&rdquo;. Thao tác này sẽ đồng bộ thủ công trạng thái đăng ký của bạn. Nếu vấn đề vẫn còn, hãy liên hệ <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a>."
    privacy:
      heading: "Quyền riêng tư & File"
      q1: "File tôi tải lên có bị lưu trữ không?"
      a1: "Không. File được xử lý ngay lập tức và tự động xóa trong vòng 3 giờ. Chúng tôi không bao giờ lưu trữ, phân tích hay chia sẻ ảnh của bạn."
      q2: "File đã xử lý có thể tải xuống trong bao lâu?"
      a2: "Link tải xuống khả dụng trong 3 giờ sau khi xử lý."
    account:
      heading: "Tài khoản"
      q1: "Tôi đăng nhập như thế nào?"
      a1: "Chúng tôi dùng Google Sign-In. Nhấn &ldquo;Đăng nhập&rdquo; và đăng nhập bằng tài khoản Google của bạn — không cần mật khẩu."
      q2: "Điều gì xảy ra nếu tôi xóa tài khoản?"
      a2: "Tài khoản và toàn bộ dữ liệu liên quan của bạn sẽ bị xóa vĩnh viễn khỏi Allimgtools. Nếu bạn đang có gói Pro, hãy hủy trước từ Trang của tôi."

