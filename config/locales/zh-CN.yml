    general:
      heading: "常规"
      q1: "Allimgtools 是免费的吗？"
      a1: "是的。全部 6 个图片工具完全免费，无需账户。免费用户每次可处理最多 10 个文件，每个文件最大 10MB。"
      q2: "我需要创建账户吗？"
      a2: "不需要。您无需注册即可使用所有工具。只有在升级到 Pro 时才需要账户。"
      q3: "支持哪些文件格式？"
      a3: "我们支持 JPEG、PNG、GIF、WebP 和 AVIF。"
    pro_plan:
      heading: "Pro 计划"
      q1: "Pro 计划包含什么？"
      a1: "Pro 用户每批可上传最多 30 个文件（免费计划为 10 个），每个文件最大 30MB（免费计划为 10MB）。其他功能完全相同。"
      q2: "如何付款？"
      a2: "付款通过 Paddle 安全处理。我们接受所有主流信用卡和借记卡。"
      q3: "可以随时取消吗？"
      a3_html: "可以。您可以随时在<a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">我的页面</a>取消订阅。无需任何理由。"
      q4: "取消后会发生什么？"
      a4: "您的 Pro 访问权限将持续到当前计费周期结束。之后不会再产生任何费用。"
      q5: "可以申请退款吗？"
      a5_html: "请发送邮件至 <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a>，我们将尽力为您提供帮助。"
      q6: "我已订阅但 Pro 功能不可用。"
      a6_html: "请前往<a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">我的页面</a>，点击 &ldquo;已付款？验证订阅&rdquo;。这将手动同步您的订阅状态。如果问题仍然存在，请联系 <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a>。"
    privacy:
      heading: "隐私与文件"
      q1: "我上传的文件会被存储吗？"
      a1: "不会。文件处理完成后会立即被自动删除，最长保留 3 小时。我们绝不存储、分析或共享您的图片。"
      q2: "处理后的文件可以下载多长时间？"
      a2: "处理完成后，下载链接有效期为 3 小时。"
    account:
      heading: "账户"
      q1: "如何登录？"
      a1: "我们使用 Google 登录。点击 &ldquo;登录&rdquo; 并使用您的 Google 账户登录——无需密码。"
      q2: "如果我删除账户会怎样？"
      a2: "您的账户及所有相关数据将从 Allimgtools 中永久删除。如果您有活跃的 Pro 订阅，请先在我的页面取消订阅。"

