  faq:
    meta_title: "常見問題 — Allimgtools"
    meta_description: "關於 Allimgtools 的常見問題——免費圖片工具、Pro 方案、隱私等。"
    title: "常見問題"
    contact: "還有疑問？"
    contact_link: "聯絡我們"
    general:
      heading: "一般"
      q1: "Allimgtools 是免費的嗎？"
      a1: "是的。全部 6 個圖片工具完全免費，無需帳戶。免費用戶每次可處理最多 10 個檔案，每個檔案最大 10MB。"
      q2: "我需要建立帳戶嗎？"
      a2: "不需要。您無需註冊即可使用所有工具。只有在升級至 Pro 時才需要帳戶。"
      q3: "支援哪些檔案格式？"
      a3: "我們支援 JPEG、PNG、GIF、WebP 和 AVIF。"
    pro_plan:
      heading: "Pro 方案"
      q1: "Pro 方案包含什麼？"
      a1: "Pro 用戶每批可上傳最多 30 個檔案（免費方案為 10 個），每個檔案最大 30MB（免費方案為 10MB）。其他功能完全相同。"
      q2: "如何付款？"
      a2: "付款透過 Paddle 安全處理。我們接受所有主流信用卡和金融卡。"
      q3: "可以隨時取消嗎？"
      a3_html: "可以。您可以隨時在<a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">我的頁面</a>取消訂閱。無需任何說明。"
      q4: "取消後會發生什麼？"
      a4: "您的 Pro 存取權限將持續到目前計費週期結束。之後不會再產生任何費用。"
      q5: "可以申請退款嗎？"
      a5_html: "請發送郵件至 <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a>，我們將盡力為您提供協助。"
      q6: "我已訂閱但 Pro 功能無法使用。"
      a6_html: "請前往<a href=\"/my-page\" class=\"underline hover:text-primary transition-colors\">我的頁面</a>，點擊 &ldquo;已付款？驗證訂閱&rdquo;。這將手動同步您的訂閱狀態。如果問題仍然存在，請聯絡 <a href=\"mailto:support@allimgtools.com\" class=\"underline hover:text-primary transition-colors\">support@allimgtools.com</a>。"
    privacy:
      heading: "隱私與檔案"
      q1: "我上傳的檔案會被儲存嗎？"
      a1: "不會。檔案處理完成後會立即被自動刪除，最長保留 3 小時。我們絕不儲存、分析或分享您的圖片。"
      q2: "處理後的檔案可以下載多長時間？"
      a2: "處理完成後，下載連結有效期為 3 小時。"
    account:
      heading: "帳戶"
      q1: "如何登入？"
      a1: "我們使用 Google 登入。點擊 &ldquo;登入&rdquo; 並使用您的 Google 帳戶登入——無需密碼。"
      q2: "如果我刪除帳戶會怎樣？"
      a2: "您的帳戶及所有相關資料將從 Allimgtools 中永久刪除。如果您有有效的 Pro 訂閱，請先在我的頁面取消訂閱。"

