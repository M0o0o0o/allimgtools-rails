<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <clipPath id="frame-clip">
      <rect x="4" y="6" width="24" height="20" rx="2.5"/>
    </clipPath>
  </defs>

  <!-- Blue rounded square background -->
  <rect width="32" height="32" rx="7" fill="#3B7BF5"/>

  <!-- Photo frame inner fill -->
  <rect x="4" y="6" width="24" height="20" rx="2.5" fill="white" fill-opacity="0.15"/>

  <!-- Sun -->
  <circle cx="10.5" cy="12" r="2.5" fill="white" clip-path="url(#frame-clip)"/>

  <!-- Mountain landscape -->
  <polygon points="4,26 14,14 20,21 23,18 28,26" fill="white" clip-path="url(#frame-clip)"/>

  <!-- Photo frame border -->
  <rect x="4" y="6" width="24" height="20" rx="2.5" fill="none" stroke="white" stroke-width="1.5"/>
</svg>
